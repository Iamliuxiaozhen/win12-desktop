name: (shared) build

on:
  workflow_call:
    inputs:
      platform:
        type: string
        required: true
      args:
        type: string
        default: ""
      rust-targets:
        type: string
        default: ""
      name:
        type: string
        default: ""

jobs:
  build-app:
    name: Build ${{ inputs.name != '' && inputs.name || inputs.platform }}
    runs-on: ${{ inputs.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust-targets }}

      - name: Install Linux dependencies
        if: inputs.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ inputs.args }}

      - name: Debug - list bundle directories
        shell: bash # On Windows this will be Git Bash
        run: |
          echo "=== target tree ==="
          ls -R tauri/src-tauri/target/*/release/bundle/ || true
          ls -R tauri/src-tauri/target/release/bundle/ || true
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ inputs.name }}
          path: |
            tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            tauri/src-tauri/target/release/bundle/deb/*.deb
            tauri/src-tauri/target/release/bundle/rpm/*.rpm
            tauri/src-tauri/target/release/bundle/msi/*.msi
            tauri/src-tauri/target/release/bundle/nsis/*.exe
            tauri/src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 5
