name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，例如 v0.1.0"
        type: string
        required: true
      confirm_release:
        description: "我确认已完成本次版本发行所需的全部准备工作（包括但不限于版本号更新、CHANGELOG 更新、文档同步、代码审查及必要测试）。"
        type: boolean
        default: false
        required: true

permissions:
  contents: write

jobs:
  confirm-release:
    name: Confirm Release
    runs-on: ubuntu-latest
    steps:
      - name: Check release confirmation
        if: ${{ inputs.confirm_release != true }}
        run: |
          echo "❌ 发行已取消：请先确认已完成所有发行前准备工作。"
          exit 1

  build:
    name: Build ${{ matrix.platform }}
    needs: confirm-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS (Apple Silicon)
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS (Intel)
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb,rpm"
            name: Linux (x86_64)
            rust-targets: ""
          - platform: windows-latest
            args: ""
            name: Windows (x86_64)
            rust-targets: ""

    uses: ./.github/workflows/_shared-build.yaml
    with:
      platform: ${{ matrix.platform }}
      args: ${{ matrix.args }}
      rust-targets: ${{ matrix.rust-targets }}
      name: ${{ matrix.name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-bundles-*
          path: ./release
          merge-multiple: true
      - name: Debug - list files
        run: |
          tree .
      - name: Generate release notes
        shell: bash
        run: |
          if ! find release -type f -print -quit | grep -q .; then
            echo "No release files found; refusing to publish an empty checksum table." >&2
            exit 1
          fi

          {
            echo "# Win12 Desktop ${{ inputs.tag }}"
            echo
            echo "其他下载地址："
            echo
            echo "[![Mirror nju.mirror.edu.cn](https://img.shields.io/badge/Mirror-nju.mirror.edu.cn-61dafb.svg?style=flat-square)](https://mirror.nju.edu.cn/github-release/win12-online/win12-desktop/)"
            echo
            echo "## 文件校验"
            echo
            echo "| File | Checksum (SHA256) |"
            echo "| --- | --- |"
            find release -type f -print0 \
              | sort -z \
              | while IFS= read -r -d '' file; do
                  checksum="$(sha256sum "$file" | awk '{ print toupper($1) }')"
                  filename="$(basename "$file")"
                  echo "| \`$filename\` | \`$checksum\` |"
                done
          } > release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.BEDEVERE_WIN12_BOT_TOKEN }}
          tag_name: ${{ inputs.tag }}
          name: Win12-desktop ${{ inputs.tag }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          files: |
            release/**/*
      - name: Trigger NJU mirror sync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NJU_MIRROR_SSH_KEY }}" > ~/.ssh/nju_key
          chmod 600 ~/.ssh/nju_key
          ssh -i ~/.ssh/nju_key \
            -p 52222 \
            -o StrictHostKeyChecking=no \
            pushsync@mirror.nju.edu.cn \
            github-release